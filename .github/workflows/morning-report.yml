name: Morning Report

on:
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy mã nguồn từ repo về máy ảo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Thiết lập môi trường Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Cài đặt các thư viện cần thiết
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Chạy script Python để sinh ra file index.html mới
      - name: Run script to generate HTML
        run: python generate_dashboard.py

      # 5. Commit và Push file index.html mới lên GitHub
      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard time [skip ci]" && git push)
